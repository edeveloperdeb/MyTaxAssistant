<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <link rel="stylesheet" href="style.css">

  </head>

  <body>
    <div id="deductionTool">
      <!-- TABS -->
      <div class="tabs">
        <button class="tab active" data-tab="deductions">Deduction Finder</button>
        <button class="tab" data-tab="rates">Rates & Thesholds</button>
        <button class="tab" data-tab="calculations">Calculations</button>
      </div>

      <!-- DEDUCTIONS TAB -->
      <div class="tab-content active" id="tab-deductions">
        <input
          id="searchDeductions"
          type="text"
          placeholder="🔍 Search deductions…"
        />
        <div id="deductionResults"></div>
      </div>

      <!-- RATES TAB -->
      <div class="tab-content" id="tab-rates">
        <input id="searchRates" type="text" placeholder="🔍 Search rates…" />
        <div id="rateResults"></div>
      </div>

      <!-- CALCULATION TAB -->
      <div class="tab-content" id="tab-calculations">
        <input
          id="searchCalculations"
          type="text"
          placeholder="🔍 Search calculations…"
        />
        <div id="calculationResults"></div>
      </div>

      <!-- PRINT BUTTON -->
      <button id="printBtn">Print</button>
    </div>

    <script src="script.js"></script>

</body>
</html>
